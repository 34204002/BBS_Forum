<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBS论坛</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="nav">
    <a href="index.html" class="brand">南昌大学BBS</a>
    <div class="links">
        <a href="index.html">首页</a>
        <a href="create.html" id="nav-create" style="display:none">发帖</a>
        <a href="profile.html" id="nav-profile" style="display:none">个人中心</a>
        <a href="admin.html" id="nav-admin" style="display:none">后台管理</a>
        <span class="user-info">
            <span id="nav-user"></span>
            <a href="login.html"><button id="btn-logout" style="display:none">退出</button></a>
            <a href="login.html" id="btn-gologin">登录</a>
        </span>
    </div>
</div>

<div class="container">
    <div class="search-bar">
        <input id="keyword-input" type="text" placeholder="搜索帖子标题..." onkeydown="if(event.key==='Enter')searchPosts()">
        <button class="btn btn-primary" onclick="searchPosts()">搜索</button>
        <a href="index.html?tab=hot" class="btn btn-outline" style="margin-left:8px">热门</a>
    </div>
    <div id="board-list" class="board-list"></div>
    <div class="sort-tabs">
        <span class="sort-tab active" onclick="switchSort('createTime', this)">最新</span>
        <span class="sort-tab" onclick="switchSort('likeCount', this)">最多点赞</span>
        <span class="sort-tab" onclick="switchSort('commentCount', this)">最多回复</span>
    </div>
    <div id="post-list"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script src="js/api.js"></script>
<script>
let currentBoardId = null;
let currentPage = 1;
let currentOrder = 'createTime';
let currentKeyword = '';

function updateNav() {
    if (isLoggedIn()) {
        document.getElementById('nav-create').style.display = '';
        document.getElementById('nav-profile').style.display = '';
        document.getElementById('btn-logout').style.display = '';
        document.getElementById('btn-gologin').style.display = 'none';
        if (isAdmin()) document.getElementById('nav-admin').style.display = '';
        const u = getUser();
        document.getElementById('nav-user').textContent = u ? `你好，${u.nickname || u.username}` : '';
    }
}

async function loadBoards() {
    try {
        const res = await $.get('/boards');
        const boards = res.data || [];
        const div = document.getElementById('board-list');
        div.innerHTML = '<span class="board-tag ' + (!currentBoardId ? 'active' : '') + '" onclick="selectBoard(null)">全部</span>' +
            boards.map(b => `<span class="board-tag ${currentBoardId===b.id?'active':''}" onclick="selectBoard(${b.id})">${b.name}</span>`).join('');
    } catch (e) { console.error(e); }
}

async function loadPosts() {
    try {
        let params = `page=${currentPage}&size=10&orderBy=${currentOrder}`;
        if (currentBoardId) params += `&boardId=${currentBoardId}`;
        if (currentKeyword) params += `&keyword=${encodeURIComponent(currentKeyword)}`;
        const res = await $.get(`/posts?${params}`);
        const data = res.data;
        const div = document.getElementById('post-list');
        const list = data.list || [];
        if (list.length === 0) {
            div.innerHTML = '<p style="text-align:center;color:#999;padding:40px">暂无帖子</p>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        div.innerHTML = list.map(p => `
            <div class="post-item" onclick="location.href='post.html?id=${p.id}'">
                ${avatarHtml(p.avatar, p.nickname || p.username)}
                <div style="flex:1">
                    <div style="font-size:15px;font-weight:500">
                        ${p.isTop ? '<span class="tag tag-top">置顶</span>' : ''}
                        ${p.isEssence ? '<span class="tag tag-essence">精华</span>' : ''}
                        ${p.isDemand ? '<span class="tag tag-demand">需求</span>' : ''}
                        ${escHtml(p.title)}
                    </div>
                    <div class="meta">
                        <span>${escHtml(p.boardName || '')}</span>
                        <span>${escHtml(p.nickname || p.username)}</span>
                        <span>👁 ${p.viewCount || 0}</span>
                        <span>❤ ${p.likeCount || 0}</span>
                        <span>💬 ${p.commentCount || 0}</span>
                        <span>${p.createTime}</span>
                    </div>
                </div>
            </div>`).join('');

        const pg = document.getElementById('pagination');
        let html = '';
        if (data.pages > 1) {
            html += `<button ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">上一页</button>`;
            for (let i = 1; i <= data.pages; i++) {
                html += `<button ${i===currentPage?'class="active"':''} onclick="goPage(${i})">${i}</button>`;
            }
            html += `<button ${currentPage===data.pages?'disabled':''} onclick="goPage(${currentPage+1})">下一页</button>`;
        }
        pg.innerHTML = html;
    } catch (e) { console.error(e); }
}

function searchPosts() {
    currentKeyword = document.getElementById('keyword-input').value.trim();
    currentPage = 1;
    loadPosts();
}

function switchSort(order, el) {
    currentOrder = order;
    currentPage = 1;
    document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    loadPosts();
}

function selectBoard(id) {
    currentBoardId = id;
    currentPage = 1;
    loadBoards();
    loadPosts();
}

function goPage(p) { currentPage = p; loadPosts(); window.scrollTo(0, 0); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function avatarHtml(url, name) {
    const letter = (name || '?')[0].toUpperCase();
    if (url) return `<img src="${escHtml(url)}" class="avatar-sm" onerror="this.style.display='none';this.nextElementSibling.style.display=''"><span class="avatar-sm avatar-fallback" style="display:none">${letter}</span>`;
    return `<span class="avatar-sm avatar-fallback">${letter}</span>`;
}

// 支持 ?tab=hot
if (new URLSearchParams(location.search).get('tab') === 'hot') {
    currentOrder = 'likeCount';
}

updateNav();
loadBoards();
loadPosts();
</script>
</body>
</html>
