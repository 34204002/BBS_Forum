<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBS论坛 - 登录</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

<div class="login-box">
    <h1>南昌大学BBS论坛</h1>
    <div class="tabs">
        <span id="tab-login" class="active" onclick="switchTab('login')">登录</span>
        <span id="tab-reg" onclick="switchTab('reg')">注册</span>
    </div>

    <div id="form-login">
        <div class="form-group"><label>用户名</label><input id="l-username" placeholder="请输入用户名"></div>
        <div class="form-group"><label>密码</label><input id="l-password" type="password" placeholder="请输入密码"></div>
        <button class="btn btn-primary" style="width:100%;padding:10px" onclick="doLogin()">登 录</button>
    </div>

    <div id="form-reg" style="display:none">
        <div class="form-group"><label>用户名</label><input id="r-username" placeholder="请输入用户名"></div>
        <div class="form-group"><label>邮箱</label><input id="r-email" placeholder="请输入邮箱"></div>
        <div class="form-group"><label>密码</label><input id="r-password" type="password" placeholder="请输入密码"></div>
        <button class="btn btn-primary" style="width:100%;padding:10px" onclick="doRegister()">注 册</button>
    </div>
</div>

<script src="js/api.js"></script>
<script>
function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-reg').style.display = tab === 'reg' ? 'block' : 'none';
}

async function doLogin() {
    try {
        const username = document.getElementById('l-username').value;
        const password = document.getElementById('l-password').value;
        const res = await $.post('/auth/login', { username, password });
        setToken(res.data.token);
        setUser(res.data.user);
        location.href = '/index.html';
    } catch (e) { alert(e.message); }
}

async function doRegister() {
    try {
        const username = document.getElementById('r-username').value;
        const email = document.getElementById('r-email').value;
        const password = document.getElementById('r-password').value;
        const res = await $.post('/auth/register', { username, email, password });
        setToken(res.data.token);
        setUser(res.data.user);
        location.href = '/index.html';
    } catch (e) { alert(e.message); }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
