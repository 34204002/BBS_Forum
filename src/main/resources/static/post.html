<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子详情</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="nav">
    <a href="index.html" class="brand">南昌大学BBS</a>
    <div class="links">
        <a href="index.html">首页</a>
        <a href="create.html" id="nav-create" style="display:none">发帖</a>
        <a href="profile.html" id="nav-profile" style="display:none">个人中心</a>
        <span class="user-info">
            <span id="nav-user"></span>
            <a href="login.html"><button id="btn-logout" style="display:none">退出</button></a>
            <a href="login.html" id="btn-gologin">登录</a>
        </span>
    </div>
</div>

<div class="container">
    <div id="post-detail"></div>
    <div class="card" id="comment-form" style="display:none">
        <h3 id="comment-form-title">发表回复</h3>
        <div class="form-group">
            <textarea id="comment-content" rows="3" placeholder="写下你的回复...支持 @用户名"></textarea>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="file" id="comment-image-file" accept="image/*" style="display:none" onchange="uploadCommentImage()">
            <button class="btn btn-primary" id="comment-submit-btn" onclick="submitComment(null)">发布回复</button>
            <button class="btn btn-outline" id="comment-cancel-btn" style="display:none" onclick="cancelEdit()">取消编辑</button>
            <button type="button" class="btn btn-sm btn-outline" onclick="document.getElementById('comment-image-file').click()">📷 图片</button>
            <span id="comment-upload-tip" style="font-size:12px;color:#999;display:none">上传中...</span>
        </div>
        <input type="hidden" id="reply-parent-id">
        <input type="hidden" id="edit-comment-id">
    </div>
    <h3 style="margin:20px 0 12px">回复列表</h3>
    <div id="comment-list"></div>
</div>

<script src="js/api.js"></script>
<script>
const urlParams = new URLSearchParams(location.search);
const postId = urlParams.get('id');
let postLiked = false, postFavorited = false, postLikeCount = 0;

function updateNav() {
    if (isLoggedIn()) {
        document.getElementById('nav-create').style.display = '';
        document.getElementById('nav-profile').style.display = '';
        document.getElementById('btn-logout').style.display = '';
        document.getElementById('btn-gologin').style.display = 'none';
        document.getElementById('comment-form').style.display = '';
        document.getElementById('nav-user').textContent = getUser()?.nickname || getUser()?.username || '';
    }
}

async function loadPost() {
    try {
        const res = await $.get(`/posts/${postId}`);
        const p = res.data;
        postLiked = p.liked || false;
        postFavorited = p.favorited || false;
        postLikeCount = p.likeCount || 0;
        document.title = p.title;
        const cu = getUser();
        const isOwner = cu && cu.id === p.userId;
        const isAdminUser = cu && cu.role === 'admin';
        document.getElementById('post-detail').innerHTML = `
            <div class="card">
                <h2>${escHtml(p.title)} ${p.isTop ? '<span class="tag tag-top">置顶</span>' : ''} ${p.isEssence ? '<span class="tag tag-essence">精华</span>' : ''}</h2>
                <div class="author-row" style="margin:12px 0">${avatarHtml(p.avatar, p.nickname || p.username)}
                    <div><strong>${escHtml(p.nickname || p.username)}</strong></div>
                </div>
                <div class="meta" style="margin:12px 0">
                    <span>板块: ${escHtml(p.boardName)}</span>
                    <span>👁 ${p.viewCount || 0}</span>
                    <span id="like-count">❤ ${p.likeCount || 0}</span>
                    <span>💬 ${p.commentCount || 0}</span>
                    <span>${p.createTime}</span>
                </div>
                <div class="markdown-body" style="margin-top:16px">${marked.parse(p.content || '')}</div>
                <div style="margin-top:16px">
                    ${isLoggedIn() ? `
                        <button class="btn btn-sm ${postLiked ? 'btn-liked' : 'btn-outline'}" id="btn-like" onclick="toggleLike()">♥ 点赞</button>
                        <button class="btn btn-sm ${postFavorited ? 'btn-faved' : 'btn-outline'}" id="btn-fav" onclick="toggleFavorite()">★ 收藏</button>
                    ` : ''}
                    ${isOwner || isAdminUser ? `
                        <a href="create.html?id=${p.id}" class="btn btn-sm btn-outline">编辑</a>
                        <button class="btn btn-sm btn-danger" onclick="doDeletePost()">删除</button>
                    ` : ''}
                </div>
            </div>`;
    } catch (e) { alert('帖子不存在'); location.href = 'index.html'; }
}

function playPulse(el) {
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 400);
}

async function toggleLike() {
    if (!isLoggedIn()) return;
    const btn = document.getElementById('btn-like');
    try {
        if (postLiked) {
            await $.del('/likes', { targetType: 1, targetId: parseInt(postId) });
        } else {
            await $.post('/likes', { targetType: 1, targetId: parseInt(postId) });
        }
        postLiked = !postLiked;
        postLikeCount += postLiked ? 1 : -1;
        if (btn) {
            btn.className = 'btn btn-sm ' + (postLiked ? 'btn-liked' : 'btn-outline');
            playPulse(btn);
        }
        const span = document.getElementById('like-count');
        if (span) span.innerHTML = '♥ ' + postLikeCount;
    } catch (e) { toast(e.message, 'error'); }
}

async function toggleFavorite() {
    if (!isLoggedIn()) return;
    const btn = document.getElementById('btn-fav');
    try {
        if (postFavorited) {
            await $.del(`/favorites/${postId}`);
        } else {
            await $.post('/favorites', { postId: parseInt(postId) });
        }
        postFavorited = !postFavorited;
        if (btn) {
            btn.className = 'btn btn-sm ' + (postFavorited ? 'btn-faved' : 'btn-outline');
            playPulse(btn);
        }
    } catch (e) { toast(e.message, 'error'); }
}

async function loadComments() {
    try {
        const res = await $.get(`/posts/${postId}/comments?page=1&size=100`);
        const list = res.data.list || [];
        document.getElementById('comment-list').innerHTML = list.length === 0
            ? '<p style="text-align:center;color:#999;padding:20px">暂无回复</p>'
            : list.map(c => renderComment(c)).join('');
    } catch (e) { console.error(e); }
}

function renderComment(c) {
    const cu = getUser();
    const isMine = cu && cu.id === c.userId;
    const isAdminUser = cu && cu.role === 'admin';
    let html = `<div class="comment" id="comment-${c.id}">
        <div class="comment-header">${avatarHtml(c.avatar, c.nickname || c.username)} <div><strong>${escHtml(c.nickname || c.username)}</strong><span class="comment-time">${c.createTime}</span></div></div>
        <div class="content markdown-body">${marked.parse(c.content || '')}</div>
        <div class="actions">
            ${isLoggedIn() ? `<a class="${c.isLiked ? 'heart-liked' : 'heart-none'}" onclick="toggleCommentLike(${c.id})">♥ ${c.likeCount || 0}</a>` : ''}
            ${isLoggedIn() ? `<a onclick="replyTo(${c.id}, '${escHtml(c.nickname||c.username).replace(/'/g, "\\'")}')">回复</a>` : ''}
            ${isMine || isAdminUser ? `<a onclick="editComment(${c.id}, '${escHtml(c.content).replace(/'/g, "\\'")}')">编辑</a>` : ''}
            ${isMine || isAdminUser ? `<a onclick="deleteComment(${c.id})" style="color:#ff4d4f">删除</a>` : ''}
        </div>`;
    if (c.children && c.children.length) {
        html += `<div class="children">${c.children.map(renderComment).join('')}</div>`;
    }
    html += '</div>';
    return html;
}

async function toggleCommentLike(cid) {
    try {
        const res = await $.get(`/likes/status?targetType=2&targetId=${cid}`);
        if (res.data) {
            await $.del('/likes', { targetType: 2, targetId: cid });
        } else {
            await $.post('/likes', { targetType: 2, targetId: cid });
        }
        loadComments();
    } catch (e) { toast(e.message, 'error'); }
}

function replyTo(parentId, name) {
    cancelEdit();
    document.getElementById('reply-parent-id').value = parentId;
    document.getElementById('comment-content').placeholder = `回复 ${name}...`;
    document.getElementById('comment-content').focus();
}

function editComment(cid, content) {
    document.getElementById('edit-comment-id').value = cid;
    document.getElementById('comment-content').value = content;
    document.getElementById('reply-parent-id').value = '';
    document.getElementById('comment-form-title').textContent = '编辑回复';
    document.getElementById('comment-submit-btn').textContent = '保存修改';
    document.getElementById('comment-cancel-btn').style.display = '';
    document.getElementById('comment-content').focus();
}

function cancelEdit() {
    document.getElementById('edit-comment-id').value = '';
    document.getElementById('comment-content').value = '';
    document.getElementById('reply-parent-id').value = '';
    document.getElementById('comment-form-title').textContent = '发表回复';
    document.getElementById('comment-submit-btn').textContent = '发布回复';
    document.getElementById('comment-cancel-btn').style.display = 'none';
    document.getElementById('comment-content').placeholder = '写下你的回复...支持 @用户名';
}

async function uploadCommentImage() {
    const file = document.getElementById('comment-image-file').files[0];
    if (!file) return;
    const tip = document.getElementById('comment-upload-tip');
    tip.style.display = '';
    try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload/post', {
            method: 'POST',
            headers: { 'Authorization': getToken() },
            body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '上传失败');
        const ta = document.getElementById('comment-content');
        ta.value = ta.value + `\n![](${data.data.url})\n`;
        tip.style.display = 'none';
        document.getElementById('comment-image-file').value = '';
    } catch (e) {
        tip.style.display = 'none';
        toast(e.message, 'error');
    }
}

async function submitComment() {
    try {
        const content = document.getElementById('comment-content').value.trim();
        if (!content) return;
        const editId = document.getElementById('edit-comment-id').value;
        if (editId) {
            await $.put(`/comments/${editId}`, { content: content });
            toast('修改成功');
        } else {
            const parentId = document.getElementById('reply-parent-id').value || null;
            await $.post('/comments', { postId: parseInt(postId), content, parentId: parentId ? parseInt(parentId) : null });
        }
        cancelEdit();
        loadComments();
    } catch (e) { toast(e.message, 'error'); }
}

async function deleteComment(cid) {
    if (!confirm('确认删除这条回复？')) return;
    try { await $.del(`/comments/${cid}`); loadComments(); } catch (e) { toast(e.message, 'error'); }
}

async function doDeletePost() {
    if (!confirm('确认删除？')) return;
    try { await $.del(`/posts/${postId}`); location.href = 'index.html'; } catch(e) { toast(e.message, 'error'); }
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function avatarHtml(url, name) {
    const letter = (name || '?')[0].toUpperCase();
    if (url) return `<img src="${escHtml(url)}" class="avatar-sm" onerror="this.style.display='none';this.nextElementSibling.style.display=''"><span class="avatar-sm avatar-fallback" style="display:none">${letter}</span>`;
    return `<span class="avatar-sm avatar-fallback">${letter}</span>`;
}
function escHtmlWithAt(s) {
    return escHtml(s).replace(/@([a-zA-Z0-9_一-龥]+)/g, '<span class="at-mention">@$1</span>');
}

function toast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast toast-' + (type || 'success');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

updateNav();
loadPost();
loadComments();
</script>
</body>
</html>
