<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布帖子</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="nav">
    <a href="index.html" class="brand">南昌大学BBS</a>
    <div class="links"><a href="index.html">首页</a></div>
</div>

<div class="container">
    <div class="card" style="max-width:800px;margin:20px auto">
        <h2 id="form-title">发布帖子</h2>
        <div class="form-group">
            <label>板块</label>
            <select id="board-id"></select>
        </div>
        <div class="form-group">
            <label>标题</label>
            <input id="post-title" placeholder="请输入标题">
        </div>
        <div class="form-group">
            <label>内容（支持 Markdown）</label>
            <textarea id="post-content" rows="10" placeholder="请输入内容...&#10;&#10;Markdown 语法提示：&#10;# 标题  ## 二级标题&#10;**粗体**  *斜体*  `代码`&#10;- 列表项&#10;[链接](url)  ![图片](url)&#10;```代码块```"></textarea>
            <div style="margin-top:8px">
                <input type="file" id="image-file" accept="image/*" style="display:none" onchange="uploadImage()">
                <button type="button" class="btn btn-sm btn-outline" onclick="document.getElementById('image-file').click()">📷 插入图片</button>
                <span id="upload-tip" style="font-size:12px;color:#999;margin-left:8px;display:none">上传中...</span>
            </div>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="is-demand" onchange="toggleDemand()"> 发布需求帖</label>
            <div id="demand-box" style="display:none;margin-top:8px">
                <label>奖励积分 <input id="reward-points" type="number" value="10" min="1" style="width:100px"></label>
            </div>
        </div>
        <button class="btn btn-primary" onclick="submitPost()">发布</button>
    </div>
</div>

<script src="js/api.js"></script>
<script>
const urlParams = new URLSearchParams(location.search);
const editId = urlParams.get('id');

async function init() {
    if (!isLoggedIn()) { location.href = 'login.html'; return; }
    const res = await $.get('/boards');
    document.getElementById('board-id').innerHTML = res.data.map(b => `<option value="${b.id}">${b.name}</option>`).join('');

    if (editId) {
        document.getElementById('form-title').textContent = '编辑帖子';
        const pr = await $.get(`/posts/${editId}`);
        document.getElementById('board-id').value = pr.data.boardId;
        document.getElementById('post-title').value = pr.data.title;
        document.getElementById('post-content').value = pr.data.content;
        if (pr.data.isDemand) { document.getElementById('is-demand').checked = true; toggleDemand(); document.getElementById('reward-points').value = pr.data.rewardPoints; }
    }
}

function toggleDemand() {
    document.getElementById('demand-box').style.display = document.getElementById('is-demand').checked ? 'block' : 'none';
}

async function uploadImage() {
    const file = document.getElementById('image-file').files[0];
    if (!file) return;
    const tip = document.getElementById('upload-tip');
    tip.style.display = '';
    try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload/post', {
            method: 'POST',
            headers: { 'Authorization': getToken() },
            body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '上传失败');
        const ta = document.getElementById('post-content');
        const mdImg = `\n![${file.name}](${data.data.url})\n`;
        ta.value = ta.value + mdImg;
        tip.style.display = 'none';
        document.getElementById('image-file').value = '';
    } catch (e) {
        tip.style.display = 'none';
        alert(e.message);
    }
}

async function submitPost() {
    const body = {
        boardId: parseInt(document.getElementById('board-id').value),
        title: document.getElementById('post-title').value,
        content: document.getElementById('post-content').value,
        isDemand: document.getElementById('is-demand').checked ? 1 : 0,
        rewardPoints: document.getElementById('is-demand').checked ? parseInt(document.getElementById('reward-points').value) : 0
    };
    try {
        if (editId) {
            await $.put(`/posts/${editId}`, { title: body.title, content: body.content });
        } else {
            await $.post('/posts', body);
        }
        location.href = 'index.html';
    } catch (e) { alert(e.message); }
}

init();
</script>
</body>
</html>
